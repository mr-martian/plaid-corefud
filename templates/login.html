<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Plaid CorefUD Login</title>
  </head>
  <body>
    {% with msg = get_flashed_messages(category_filter=['auth']) %}
    {% if msg %}
    <ul>
      {% for m in msg %}
      <li>{{m}}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}
    <form method="POST">
      <label for="username">Username:</label>
      <input id="username" name="username"></input>
      <br/>
      <label for="password">Password:</label>
      <input id="password" name="password" type="password"></input>
      <button type="submit">Login</button>
    </form>
  </body>
</html>
