<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Plaid CorefUD Projects</title>
  </head>
  <body>
    <table>
      <thead>
	<tr>
	  <th>Project</th>
	  <th>Documents</th>
	</tr>
      </thead>
      <tbody>
	{% for ent in data.entries %}
	<tr>
	  <td><a href="/project/{{ent['project/id']}}">{{ent['project/name']}}</a></td>
	  <td>{{ent['project/document-count']}}</td>
	</tr>
	{% endfor %}
      </tbody>
    </table>
  </body>
</html>
